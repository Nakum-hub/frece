name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q -m "not acceptance" | tee pytest-summary.txt
      - name: Ruff
        run: ruff check frece/
      - name: Mypy
        run: mypy frece/ --ignore-missing-imports

  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sleuthkit e2fsprogs libmagic1 file coreutils util-linux
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Acceptance tests
        run: sudo env "PATH=$PATH" python -m pytest -q -m acceptance
